<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>评论回车</title>
    <style>
        .wrapper{
            min-width: 400px;
            max-width: 800px;
            display: flex;
            justify-content: flex-end;
        }
        .wrapper textarea{
            width: 100%;
            height: 100%;
            outline: none;
            border-color: transparent;
            background: #f5f5f5;
            border-radius: 4px;
            padding: 10px;
            transition: all 0.5s;
        }
        textarea:focus{
            border-color: #0c0d0d;
        }

        .name{
            font-size: 18px;
            font-weight: bold;
            color: hotpink;
        }
        .text{
            font-size: 22px;
            color: #0c0d0d;
        }
        #del{
            font-size: 12px;
            width: 60px;
            color: #0c0d0d;
            border-color: transparent;
            background: #f5f5f5;
            border-radius: 4px;
            padding: 5px 10px;
            transition: all 0.5s;
        }
        #del:hover{
            background: #0c0d0d;
            color: #f5f5f5;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <textarea  id="tx" ></textarea>
        <button>发送</button>
    </div>
    <div class="list">
        <div class="item" style="display: none;">
            <i class="avatar"></i>
            <div class="info">
                <p class="name">小陈</p>
                <p class="text"></p>
                <button id="del">删除</button>
            </div>
        </div>
    </div>
   <script>
        const tx = document.querySelector('#tx')  
        const item = document.querySelector('.item')
        const text = document.querySelector('.text')
        const del = document.querySelector('#del')
        tx.addEventListener('keyup', function(e){
            if(e.key === 'Enter'){
                item.style.display = 'block'
                text.innerHTML = tx.value
            }
            tx.value = '' 
        })
        del.addEventListener('click', function(){
            item.style.display = 'none'
        })
   </script>
</body>
</html>
